version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # Hostinger will ask you to input this environment variable in their dashboard
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      # This gives the backend permission to spin up the Sandbox!
      - /var/run/docker.sock:/var/run/docker.sock
      - ./agent_workspace:/workspace
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    restart: always
